<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <!-- 主题渐变 -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0078D4"/>
      <stop offset="100%" stop-color="#005A9E"/>
    </linearGradient>
    <linearGradient id="usb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8F4FD"/>
    </linearGradient>
    <linearGradient id="wsl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0099FF"/>
      <stop offset="100%" stop-color="#0066CC"/>
    </linearGradient>
  </defs>

  <!-- 圆角方形背景 -->
  <rect x="12" y="12" width="232" height="232" rx="48" ry="48" fill="url(#bg)"/>

  <!-- USB 插头（简化三叉戟造型）-->
  <g transform="translate(88, 62)">
    <!-- USB 插头主体 -->
    <rect x="12" y="0" width="56" height="32" rx="6" fill="url(#usb)" stroke="#0078D4" stroke-width="1.5"/>
    <!-- USB 内部线条 -->
    <rect x="22" y="8" width="36" height="4" rx="2" fill="#0078D4"/>
    <rect x="22" y="16" width="36" height="4" rx="2" fill="#0078D4"/>
    <!-- USB 标识 ▲ ● ■ -->
    <polygon points="30,4 34,0 38,4" fill="#0078D4"/>
    <circle cx="47" cy="2" r="2" fill="#0078D4"/>
    <rect x="54" y="0" width="4" height="4" rx="1" fill="#0078D4"/>
  </g>

  <!-- 连接线（USB → WSL）-->
  <line x1="116" y1="94" x2="140" y2="94" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

  <!-- WSL 企鹅图标 -->
  <g transform="translate(140, 60)">
    <!-- 企鹅身体 -->
    <ellipse cx="28" cy="38" rx="28" ry="32" fill="url(#wsl)"/>
    <!-- 企鹅眼睛 -->
    <circle cx="18" cy="28" r="5" fill="white"/>
    <circle cx="38" cy="28" r="5" fill="white"/>
    <circle cx="20" cy="27" r="2.5" fill="#003366"/>
    <circle cx="40" cy="27" r="2.5" fill="#003366"/>
    <!-- 企鹅嘴 -->
    <polygon points="28,33 24,37 32,37" fill="#FF8C00"/>
    <!-- 企鹅肚子 -->
    <ellipse cx="28" cy="48" rx="18" ry="18" fill="white" opacity="0.9"/>
  </g>

  <!-- USB 线缆 -->
  <path d="M 88 78 Q 76 78 76 94 Q 76 110 88 110" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- 底部文字 -->
  <text x="128" y="218" text-anchor="middle" font-family="Microsoft YaHei, Segoe UI, sans-serif" font-size="22" font-weight="bold" fill="white" opacity="0.9">USBIP</text>
</svg>
